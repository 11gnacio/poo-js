<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="danieljimenezliceovvh.cl">

    <link rel="stylesheet" href="static/css/bucles.css">

    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bucles for</title>
</head>

<body class="bg-dark text-white">

    <header>
        <nav class="navbar d-flex align-items-center">
            <div class="container-fluid">
                <a class="navbar-brand fs-1 text-warning">
                    <i class="bi bi-javascript"></i>
                </a>

                <ul>
                    <li>
                        <i class="bi bi-house fs-4"></i>
                        <a href="portada.html">Inicio</a>
                    </li>
                </ul>

                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </nav>
    </header>

    <main class="contenedor p-5 d-flex flex-wrap gap-4 align-items-center justify-content-center">
        <!-- Caja 1 -->
        <div class="card mb-4" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 1:</h5>

                <input type="text" class="form-control mb-3" id="input1" placeholder="Ingrese un nombre">

                <p class="card-text">Lista de asistencia</p>

                <button class="btn btn-primary" onclick="Contador()">Ejecutar</button>

                <div id="container1" class="mt-4 d-none">
                    <h5>Resultado</h5>
                    <div id="result1" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>
        
<!-- Caja 2 -->

        <div class="card mb-4" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 2:</h5>

                <input type="text" class="form-control mb-3" id="input2" placeholder="Ingrese un nombre">

                <p class="card-text">Lista de asistencia</p>

                <button class="btn btn-primary" onclick="ingresarUrgencia()">Ejecutar</button>

                <div id="container2" class="mt-4 d-none">
                    <h5>Resultado</h5>
                    <div id="result2" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>

        <!-- Caja 3 -->
       
        <div class="card mb-4" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 3:</h5>

                <input type="text" class="form-control mb-3" id="input3" placeholder="Ingrese un nombre">

                <p class="card-text">Lista de asistencia</p>

                <button class="btn btn-primary" onclick="delivery()">Ejecutar</button>

                <div id="container3" class="mt-4 d-none">
                    <h5>Resultado</h5>
                    <div id="result3" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- Script JS -->
    <script src="static/js/funciones.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
